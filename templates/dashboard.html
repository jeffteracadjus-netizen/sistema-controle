<link rel="stylesheet" href="/static/style.css">

<div class="container">

    <div class="sidebar">
        <img src="/static/logo.png" class="logo">
        <h3>Empresa</h3>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/relatorio">📊 Relatório</a>
    </div>

    <div class="main">

        <div class="header">
            <h2>🚀 Controle de Materiais</h2>
        </div>

        <div class="card">
            <h3>Registrar Material</h3>

            <form method="POST">
                <input name="nome" placeholder="Nome">
                <input name="telefone" placeholder="Telefone">
                <input name="material" placeholder="Material">
                <button>Registrar</button>
            </form>
        </div>

        <div class="card">
            <h3>Registros</h3>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Material</th>
                    <th>Saída</th>
                    <th>Devolução</th>
                    <th>Ação</th>
                </tr>

                {% for d in dados %}
                <tr>
                    <td>{{d[0]}}</td>
                    <td>{{d[1]}}</td>
                    <td>{{d[2]}}</td>
                    <td>{{d[3]}}</td>
                    <td>{{d[4]}}</td>
                    <td>{{d[5]}}</td>
                    <td>
                        {% if d[5] == "PENDENTE" %}
                        <a href="/devolver/{{d[0]}}" class="btn-devolver">✔</a>
                        {% endif %}
                        <a href="/excluir/{{d[0]}}" class="btn-excluir">🗑️</a>
                    </td>
                </tr>
                {% endfor %}
            </table>

        </div>

    </div>
</div>
